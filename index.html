<body >
<div class="container">
  <header class="head">
    <h1>CityGen<em>.</em></h1>
  </header>
  <div class="steps">
    <h2>Steps</h2>
    <ol id="steps-list">
    </ol>
  </div>
  <div class="map">
      <svg id="map_svg" viewBox="0 0 3000 3000">
        <g id="grid">
          <path id="grid-h" d="
          M0 0  H3005
          v250 H -5
          v250 H3005
          v250 H -5
          v250 H3005
          v250 H -5
          v250 H3005
          v250 H -5
          v250 H3005
          v250 H -5
          v250 H3005
          v250 H -5
          v250 H3005
          "

                fill="none"
                stroke="var(--mute)" />
          <path id="grid-v" d="
          M0 0
          V 3005 h 250 V-5 h 250
          V 3005 h 250 V-5 h 250
          V 3005 h 250 V-5 h 250
          V 3005 h 250 V-5 h 250
          V 3005 h 250 V-5 h 250
          V 3005 h 250 V-5 H3000
          V3005
          "
                fill="none"
                stroke="var(--mute)" />

        </g>
        <g id="cells"></g>
        <g id="random"></g>
        <g id="edges"></g>
        <g id="nodes"></g>
      </svg>
  </div>
  <div id="details" class="details">
    <p>Hover a step to inspect what changed and the settings used.</p>
  </div>
  <footer class="foot"></footer>
